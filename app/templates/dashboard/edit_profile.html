{% extends 'base.html' %}

{% block title %}I-edit ang Profile{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm overflow-hidden">
                <div class="card-header bg-success text-white py-3">
                    <div class="d-flex align-items-center">
                        <a href="{{ url_for('users.dashboard') }}" class="btn btn-light btn-sm rounded-circle me-3">
                            <i class="fas fa-arrow-left"></i>
                        </a>
                        <h4 class="mb-0 fw-bold"><i class="fas fa-user-edit me-2"></i> I-edit ang Profile</h4>
                    </div>
                </div>

                <div class="card-body p-4">
                    <p class="text-muted small mb-4">Impormasyon ng iyong Account</p>
                    
                    <form action="{{ url_for('users.edit_profile') }}" method="POST">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small fw-bold">Buong Pangalan</label>
                                <input type="text" name="full_name" class="form-control" 
                                       value="{{ current_user.full_name or '' }}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Phone Number</label>
                                <input type="text" name="phone" class="form-control" 
                                       value="{{ current_user.phone or '' }}" placeholder="09xxxxxxxxx">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Lalawigan (Province)</label>
                                <input type="text" name="province" class="form-control" 
                                       value="{{ current_user.province or '' }}" placeholder="Pampanga">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Lungsod (City)</label>
                                <input type="text" name="city" class="form-control" 
                                       value="{{ current_user.city or '' }}" placeholder="Angeles City">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Barangay</label>
                                <input type="text" name="barangay" class="form-control" 
                                       value="{{ current_user.barangay or '' }}" placeholder="Balibago">
                            </div>

                            <div class="col-12">
                                <label class="form-label small fw-bold">Kumpletong Address (Street, House No.)</label>
                                <textarea name="full_address" class="form-control" rows="3" 
                                          placeholder="Street name, house number, etc.">{{ current_user.full_address or '' }}</textarea>
                                <small class="text-muted" style="font-size: 0.75rem;">
                                    Gagamitin ito para sa mabilis na checkout at delivery.
                                </small>
                            </div>
                        </div>

                        <div class="mt-4">
                            <a href="{{ url_for('users.dashboard') }}" class="btn btn-outline-secondary w-100 mt-2 py-2">
                                I-kansela
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
